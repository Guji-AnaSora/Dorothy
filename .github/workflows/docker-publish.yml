name: Build & Deploy to Remote Server

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && vars.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ vars.DOCKERHUB_ENABLED == 'true' && format('{0}/{1}', secrets.DOCKERHUB_USERNAME, 'crucix') || '' }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Generate .env file from GitHub Secrets
        run: |
          touch .env
          [ -n "${{ secrets.FRED_API_KEY }}" ] && echo "FRED_API_KEY=${{ secrets.FRED_API_KEY }}" >> .env
          [ -n "${{ secrets.FIRMS_MAP_KEY }}" ] && echo "FIRMS_MAP_KEY=${{ secrets.FIRMS_MAP_KEY }}" >> .env
          [ -n "${{ secrets.EIA_API_KEY }}" ] && echo "EIA_API_KEY=${{ secrets.EIA_API_KEY }}" >> .env
          [ -n "${{ secrets.AISSTREAM_API_KEY }}" ] && echo "AISSTREAM_API_KEY=${{ secrets.AISSTREAM_API_KEY }}" >> .env
          [ -n "${{ secrets.ACLED_EMAIL }}" ] && echo "ACLED_EMAIL=${{ secrets.ACLED_EMAIL }}" >> .env
          [ -n "${{ secrets.ACLED_PASSWORD }}" ] && echo "ACLED_PASSWORD=${{ secrets.ACLED_PASSWORD }}" >> .env
          [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> .env
          [ -n "${{ secrets.PORT }}" ] && echo "PORT=${{ secrets.PORT }}" >> .env
          echo "CRUCIX_LANG=${{ secrets.CRUCIX_LANG != '' && secrets.CRUCIX_LANG || 'zh' }}" >> .env
          [ -n "${{ secrets.REFRESH_INTERVAL_MINUTES }}" ] && echo "REFRESH_INTERVAL_MINUTES=${{ secrets.REFRESH_INTERVAL_MINUTES }}" >> .env
          [ -n "${{ secrets.TZ }}" ] && echo "TZ=${{ secrets.TZ }}" >> .env
          [ -n "${{ secrets.HTTPS_PROXY }}" ] && echo "HTTPS_PROXY=${{ secrets.HTTPS_PROXY }}" >> .env
          [ -n "${{ secrets.LLM_PROVIDER }}" ] && echo "LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}" >> .env
          [ -n "${{ secrets.LLM_API_KEY }}" ] && echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> .env
          [ -n "${{ secrets.LLM_MODEL }}" ] && echo "LLM_MODEL=${{ secrets.LLM_MODEL }}" >> .env
          [ -n "${{ secrets.LLM_BASE_URL }}" ] && echo "LLM_BASE_URL=${{ secrets.LLM_BASE_URL }}" >> .env
          [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ] && echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Copy files to remote server
        run: |
          cat .env | ssh root@${{ secrets.REMOTE_HOST }} 'cat > ~/crucix/.env'

      - name: Copy docker-compose.yml to remote server
        run: |
          scp docker-compose.yml root@${{ secrets.REMOTE_HOST }}:~/crucix/docker-compose.yml

      - name: Deploy on remote server
        run: |
          ssh root@${{ secrets.REMOTE_HOST }} 'docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest && cd ~/crucix && docker-compose up -d && docker image prune -f'