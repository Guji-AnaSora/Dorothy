name: Build & Deploy to Remote Server

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  REMOTE_HOST: openclaw_mlxy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && vars.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ vars.DOCKERHUB_ENABLED == 'true' && format('{0}/{1}', secrets.DOCKERHUB_USERNAME, 'crucix') || '' }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan ${{ env.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Generate .env file from GitHub Secrets
        run: |
          touch .env
          if [ -n "${{ secrets.FRED_API_KEY }}" ]; then echo "FRED_API_KEY=${{ secrets.FRED_API_KEY }}" >> .env; fi
          if [ -n "${{ secrets.FIRMS_MAP_KEY }}" ]; then echo "FIRMS_MAP_KEY=${{ secrets.FIRMS_MAP_KEY }}" >> .env; fi
          if [ -n "${{ secrets.EIA_API_KEY }}" ]; then echo "EIA_API_KEY=${{ secrets.EIA_API_KEY }}" >> .env; fi
          if [ -n "${{ secrets.AISSTREAM_API_KEY }}" ]; then echo "AISSTREAM_API_KEY=${{ secrets.AISSTREAM_API_KEY }}" >> .env; fi
          if [ -n "${{ secrets.ACLED_EMAIL }}" ]; then echo "ACLED_EMAIL=${{ secrets.ACLED_EMAIL }}" >> .env; fi
          if [ -n "${{ secrets.ACLED_PASSWORD }}" ]; then echo "ACLED_PASSWORD=${{ secrets.ACLED_PASSWORD }}" >> .env; fi
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> .env; fi
          if [ -n "${{ secrets.PORT }}" ]; then echo "PORT=${{ secrets.PORT }}" >> .env; fi
          # Always write CRUCIX_LANG, default to zh if not set in secrets
          echo "CRUCIX_LANG=${{ secrets.CRUCIX_LANG != '' && secrets.CRUCIX_LANG || 'zh' }}" >> .env
          if [ -n "${{ secrets.REFRESH_INTERVAL_MINUTES }}" ]; then echo "REFRESH_INTERVAL_MINUTES=${{ secrets.REFRESH_INTERVAL_MINUTES }}" >> .env; fi
          if [ -n "${{ secrets.TZ }}" ]; then echo "TZ=${{ secrets.TZ }}" >> .env; fi
          if [ -n "${{ secrets.HTTPS_PROXY }}" ]; then echo "HTTPS_PROXY=${{ secrets.HTTPS_PROXY }}" >> .env; fi
          if [ -n "${{ secrets.LLM_PROVIDER }}" ]; then echo "LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}" >> .env; fi
          if [ -n "${{ secrets.LLM_API_KEY }}" ]; then echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> .env; fi
          if [ -n "${{ secrets.LLM_MODEL }}" ]; then echo "LLM_MODEL=${{ secrets.LLM_MODEL }}" >> .env; fi
          if [ -n "${{ secrets.LLM_BASE_URL }}" ]; then echo "LLM_BASE_URL=${{ secrets.LLM_BASE_URL }}" >> .env; fi
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env; fi
          if [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env; fi

      - name: Deploy to remote server
        run: |
          # Copy .env file to remote server
          cat .env | ssh ${{ env.REMOTE_HOST }} 'cat > ~/crucix/.env'

          # Create docker-compose.yml locally first
          cat > /tmp/docker-compose.yml <<'COMPOSE_EOF'
services:
  crucix:
    image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
    ports:
      - "3117:3117"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./runs:/app/runs
COMPOSE_EOF

          # Copy docker-compose.yml to remote server
          scp /tmp/docker-compose.yml ${{ env.REMOTE_HOST }}:~/crucix/docker-compose.yml

          # Execute deployment commands on remote server
          ssh ${{ env.REMOTE_HOST }} 'bash -s' <<'SSH_EOF'
            # Pull the latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Create app directory if it doesn't exist
            mkdir -p ~/crucix

            # Run with docker-compose
            cd ~/crucix
            docker-compose pull
            docker-compose up -d

            # Clean up old images
            docker image prune -f

            # Show container status and env
            echo "=== Container status ==="
            docker ps | grep crucix
SSH_EOF